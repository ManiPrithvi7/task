# =============================================================================
# Railway — Option A (recommended): NanoMQ broker
# =============================================================================
# 1. Service → Settings → Root Directory: leave EMPTY (repository root). Not "broker/".
# 2. Service → Settings → Build → Builder: Dockerfile (disable Railpack / auto).
# 3. Dockerfile path: broker/Dockerfile.nanomq (this file sets it automatically).
# 4. Add TCP proxy on port 8883; set NANOMQ_TLS_* variables (see broker/env.railway.example).
#
# If Railway ignores this file, set variable: RAILWAY_DOCKERFILE_PATH=broker/Dockerfile.nanomq
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "broker/Dockerfile.nanomq"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
