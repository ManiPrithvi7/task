# Railway — NanoMQ broker (TCP 8883)
# Root Directory: empty (repo root). This repo also has a root Dockerfile for Node — NanoMQ
# must use path broker/Dockerfile (see railway.json).
#
# Fallback variable: RAILWAY_DOCKERFILE_PATH=broker/Dockerfile
#
# If Root Directory = broker/ only: use broker/railway.toml + Dockerfile.broker-root

[build]
builder = "DOCKERFILE"
dockerfilePath = "broker/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
