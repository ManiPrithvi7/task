# InfluxDB for mqtt-publisher-lite
# Usage: docker compose up -d
# Dashboard: http://localhost:8086 (admin / admin123456)

services:
  app:
    build: .
    container_name: proof-mqtt
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # In Docker, the InfluxDB service is reachable via the service name, not localhost.
      # This overrides any INFLUXDB_URL in .env so the app talks to the dockerized Influx.
      - INFLUXDB_URL=http://influxdb:8086
      # Kafka brokers for in-app KafkaService (internal & external access)
      - KAFKA_ENABLED=true
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=mqtt-publisher-lite
      - KAFKA_DEFAULT_TOPIC=social-webhook-events
    ports:
      - "3002:3002"
    volumes:
      # Persist application data (CA, certificates, etc.) on the host
      - ./data:/app/data
    depends_on:
      influxdb:
        condition: service_healthy
      kafka:
        condition: service_started

  influxdb:
    image: influxdb:2.7.4
    container_name: mqtt-lite-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123456
      - DOCKER_INFLUXDB_INIT_ORG=statsmqtt
      - DOCKER_INFLUXDB_INIT_BUCKET=metrics
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=statsmqtt-admin-token-2024
    volumes:
      # Persist all InfluxDB data so metrics/audit history survive app/container crashes
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  kafka:
    image: apache/kafka:4.1.0
    container_name: mqtt-lite-kafka
    restart: unless-stopped
    ports:
      - "3003:3003"        # Kafka accessibility port
    environment:
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:29093
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:3003,CONTROLLER://0.0.0.0:29093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,EXTERNAL://${KAFKA_PUBLIC_IP:-localhost}:3003
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_NUM_PARTITIONS=1
      - KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR=1
      - KAFKA_SHARE_COORDINATOR_STATE_TOPIC_NUM_PARTITIONS=1
      - KAFKA_NUM_PARTITIONS=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_MIN_INSYNC_REPLICAS=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    volumes:
      - kafka-data:/tmp/kraft-combined-logs

volumes:
  influxdb-data:
  kafka-data:
