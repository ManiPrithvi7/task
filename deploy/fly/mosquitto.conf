per_listener_settings true

# =============================================================================
# External MQTTS Listener (port 8883)
# Firmware devices connect here with TLS + X.509 client certificates.
# No username/password required -- cert CN becomes the MQTT identity.
# =============================================================================
listener 8883 0.0.0.0
protocol mqtt

# Server TLS identity (signed by Broker CA)
certfile /data/ca/mosquitto-server.crt
keyfile  /data/ca/mosquitto-server.key

# CAs that signed device certificates (see start.sh: root + optional extra-device-ca.crt)
cafile /data/ca/mosquitto-client-trust.pem
tls_version tlsv1.2

# X.509 client certificate enforcement
require_certificate true
use_identity_as_username true

# =============================================================================
# Internal Plain MQTT Listener (port 1883)
# The Node.js statsmqtt server connects here -- localhost only, no TLS needed.
# =============================================================================
listener 1883 127.0.0.1
protocol mqtt
allow_anonymous true

# =============================================================================
# General
# =============================================================================
log_type all
log_dest stdout

persistence true
persistence_location /data/mosquitto/

max_connections -1
max_queued_messages 1000
message_size_limit 262144
