# NanoMQ — plain MQTT (no TLS). Staging / Railway quick test only.
# Use nanomq.conf + NANOMQ_TLS_* for mTLS on 8883.

listeners.tcp {
  bind = "0.0.0.0:1883"
}

listeners.ssl {
  enable = false
}

listeners.ws {
  enable = false
}

http_server {
  enable = false
}

log {
  level = warn
  to    = [console]
}
