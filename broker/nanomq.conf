# NanoMQ 0.24.x — mTLS on 8883; mount PEMs under /etc/nanomq/certs/
#
# Broker server cert should use CN=PROOF-nanomq-broker (or match your SANs).
# Regenerate: broker/generate-broker-cert-openssl.sh
#   DNS: PROOF-nanomq-broker, switchback.proxy.rlwy.net, localhost — optional IPs: BROKER_SAN_IPS="a.b.c.d,e.f.g.h"
# Clients connecting via Railway TCP proxy hostname set:
#   MQTT_TLS_SERVERNAME=PROOF-nanomq-broker
#   (alias: MQTT_TLS_VERIFY_HOST — same value)
# cacertfile = CA that signs *client* certs (mTLS verify_peer), not the broker issuer for server auth.

listeners.ssl {
  bind                 = "0.0.0.0:8883"
  keyfile              = "/etc/nanomq/certs/broker.key"
  certfile             = "/etc/nanomq/certs/broker.crt"
  cacertfile           = "/etc/nanomq/certs/root_ca.crt"
  verify_peer          = true
  fail_if_no_peer_cert = true
}

listeners.tcp {
  enable = false
}

listeners.ws {
  enable = false
}

http_server {
  enable = false
}

log {
  level = warn
  to    = [console]
}
