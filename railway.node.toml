# Railway — mqtt-publisher-lite (Node.js backend)
# Root Directory: empty (repo root)
# Dockerfile: root Dockerfile (Node 18 multi-stage build)
#
# In Railway dashboard → mqtt-publisher-lite service → Settings → Config as Code
# point to this file, OR manually set:
#   Build → Dockerfile Path = Dockerfile
#   RAILWAY_DOCKERFILE_PATH = Dockerfile
 
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
 
[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
 
# Required environment variables for this service:
# MQTT_BROKER=mqtt://nanomq-broker.railway.internal
# MQTT_PORT=1883
# NANOMQ_DISABLE_TLS=1
# PORT=3000 (or whatever your Express app listens on)
# MONGODB_URI=<your mongo connection string>
# REDIS_URL=<your redis connection string>